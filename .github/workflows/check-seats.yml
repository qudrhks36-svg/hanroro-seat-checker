name: Check Hanroro Concert Seats

on:
  workflow_dispatch: {}   # 스케줄은 cron-job.org가 외부에서 담당 (중복 실행 방지를 위해 native schedule 미사용)

concurrency:
  group: hanroro-seat-check
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-seats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run seat check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/check_seats.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update seat check state [skip ci]"
          git push
