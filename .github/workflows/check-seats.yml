name: Check Hanroro Concert Seats

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/5 0-8 * * 1-5'   # 평일 09:00~17:55 KST, 5분 간격
    - cron: '0 9 * * 1-5'       # 평일 18:00 KST 취소마감 정각 체크

concurrency:
  group: hanroro-seat-check
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check-seats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run seat check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/check_seats.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update seat check state [skip ci]"
          git push
